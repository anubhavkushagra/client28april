syntax = "proto3";
package kv;

enum OpType { GET = 0; PUT = 1; DELETE = 2; }

message LoginRequest  { string api_key = 1; string client_id = 2; }
message LoginResponse { bool success = 1; string jwt_token = 2; }

message SingleRequest  { OpType type = 1; string key = 2; string value = 3; }
message SingleResponse { bool success = 1; string value = 2; }

message BatchRequest  { repeated SingleRequest requests = 1; }
message BatchResponse { repeated SingleResponse responses = 1; }

message ScanRequest {
  string prefix = 1;
  int32 limit = 2;
}

message ScanResponse {
  bool success = 1;
  repeated string keys = 2;
  string error_message = 3;
}

// -----------------------------------------------------
// REGISTRATION
// -----------------------------------------------------

message RegisterRequest {
  string client_id = 1;
}

message RegisterResponse {
  bool success = 1;
  string api_key = 2;    // kept for backward compat (now unused internally)
  string error_message = 3;
  string jwt_token = 4;  // permanent JWT returned directly — no Login() needed
}

// -----------------------------------------------------
// DISCOVERY MESSAGES
// -----------------------------------------------------
message Empty {}
message NodeList { repeated string endpoints = 1; }

// -----------------------------------------------------
// CORE KV SERVICE
// -----------------------------------------------------

service KVService {
  rpc Login        (LoginRequest)  returns (LoginResponse);
  rpc Register     (RegisterRequest) returns (RegisterResponse);
  rpc ExecuteSingle(SingleRequest) returns (SingleResponse);
  rpc ExecuteBatch (BatchRequest)  returns (BatchResponse);
  rpc Scan         (ScanRequest)   returns (ScanResponse);
  rpc GetLiveNodes (Empty)         returns (NodeList);
}
